schema_version: "1.0"
title: Carbon-neutral delivery concept
purpose: Explore willingness to pay and proof requirements for a carbon-neutral delivery premium.
population:
  size: 6
  seed: 20260612
  attributes:
    age: ["20-22", "23-25", "26-28"]
    income: ["restricted", "entry-level", "mid-income"]
  psychographics:
    - compares sustainability claims with practical household budgets
    - wants enough proof before paying more for a delivery promise
model:
  profile: openrouter-default
  temperature: 0.2
  max_output_tokens: 500
  seed: 20260612
questions:
  - type: likert
    id: premium_likelihood
    prompt: How likely are you to pay an additional $4.50 premium per delivery if a brand displays a certified carbon-neutral badge?
    minimum: 1
    maximum: 5
    minimum_label: Very unlikely
    maximum_label: Very likely
  - type: choice
    id: main_hesitation
    prompt: What is the main reason this persona might hesitate?
    options: ["Price too high", "Need stronger proof", "Benefit feels unclear", "No hesitation"]
  - type: open_text
    id: proof_needed
    prompt: What proof or explanation would reduce hesitation the most?
limitations:
  - This synthetic exploration has not been calibrated against human survey data.
