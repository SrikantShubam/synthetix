<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Synthetix{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}">
</head>
<body>
  <header>
    <a class="brand" href="/">Synthetix</a>
    <span>Synthetic scenario exploration</span>
  </header>
  <main>{% block content %}{% endblock %}</main>
  <footer>Outputs are synthetic and non-inferential.</footer>
  <script src="{{ url_for('static', path='/app.js') }}" defer></script>
</body>
</html>
